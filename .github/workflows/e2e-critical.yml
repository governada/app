name: E2E Critical

on:
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - 'components/**'
      - 'hooks/**'
      - 'lib/**'
      - 'utils/**'
      - 'public/**'
      - 'e2e/**'
      - 'playwright.config.ts'
      - 'next.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/e2e-critical.yml'
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'components/**'
      - 'hooks/**'
      - 'lib/**'
      - 'utils/**'
      - 'public/**'
      - 'e2e/**'
      - 'playwright.config.ts'
      - 'next.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/e2e-critical.yml'

concurrency:
  group: e2e-critical-${{ github.ref }}
  cancel-in-progress: true

jobs:
  critical:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
      NEXT_PUBLIC_KOIOS_BASE_URL: https://api.koios.rest/api/v1
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      SUPABASE_SECRET_KEY: placeholder-secret-key-for-ci
      SESSION_SECRET: ci-placeholder-session-secret-at-least-32-chars
      CRON_SECRET: ci-placeholder-cron-secret
      UPSTASH_REDIS_REST_URL: https://placeholder-redis.upstash.io
      UPSTASH_REDIS_REST_TOKEN: placeholder-redis-token
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - run: npm run build
      - name: Start production server and run critical E2E
        run: |
          # Next is built with standalone output in CI; launch the generated server directly.
          SERVER_JS="$(find .next/standalone -path '*/server.js' | head -n 1)"
          test -n "$SERVER_JS"
          PORT=3000 HOSTNAME=127.0.0.1 node "$SERVER_JS" &
          npx wait-on http://127.0.0.1:3000 --timeout 60000
          npx playwright test e2e/critical-public.spec.ts e2e/critical-a11y.spec.ts --project=chromium
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-critical-${{ github.sha }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7
