name: Agent Config

on:
  pull_request:
    paths:
      - '.claude/**'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - '.github/CODEOWNERS'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/workflows/agent-config.yml'
      - '.github/workflows/pr-template.yml'
      - '.mcp.example.json'
      - 'scripts/*.js'
      - 'scripts/*.mjs'
      - 'scripts/*.sh'
      - 'scripts/validate-agent-constraints.mjs'
  push:
    branches: [main]
    paths:
      - '.claude/**'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - '.github/CODEOWNERS'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/workflows/agent-config.yml'
      - '.github/workflows/pr-template.yml'
      - '.mcp.example.json'
      - 'scripts/*.js'
      - 'scripts/*.mjs'
      - 'scripts/*.sh'
      - 'scripts/validate-agent-constraints.mjs'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate agent constraints
        run: node scripts/validate-agent-constraints.mjs
      - name: Validate JSON files
        run: |
          node -e "JSON.parse(require('fs').readFileSync('.claude/settings.json', 'utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('.mcp.example.json', 'utf8'))"
      - name: Validate shell syntax
        run: |
          shopt -s nullglob
          for file in .claude/hooks/*.sh scripts/*.sh; do
            bash -n "$file"
          done
      - name: Validate Node script syntax
        run: |
          shopt -s nullglob
          for file in scripts/*.js; do
            node --check "$file"
          done
          for file in scripts/*.mjs; do
            node --check "$file"
          done
